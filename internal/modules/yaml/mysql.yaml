artifact_ext: sql
supports_local: true
backup:
  command:
    - if [ -n "${MYSQL_DATABASE}" ]; then mysqldump --skip-dump-date -u"${MYSQL_USER:-root}" -p"${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}" --single-transaction "${MYSQL_DATABASE}" > "{{target_file}}"; else mysqldump --skip-dump-date -u"${MYSQL_USER:-root}" -p"${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}" --single-transaction --all-databases > "{{target_file}}"; fi
  target_file: /tmp/sloth-mysql-backup.sql
restore:
  backup_file:
    to_container: /tmp/sloth-mysql-restore.sql
  command:
    - if [ -n "${MYSQL_DATABASE}" ]; then mysql -u"${MYSQL_USER:-root}" -p"${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}" "${MYSQL_DATABASE}" < "{{backup_file}}"; else mysql -u"${MYSQL_USER:-root}" -p"${MYSQL_PASSWORD:-${MYSQL_ROOT_PASSWORD}}" < "{{backup_file}}"; fi
