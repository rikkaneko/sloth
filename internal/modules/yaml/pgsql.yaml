artifact_ext: sql
supports_local: true
backup:
  command:
    - if [ -n "${DB_NAME}" ]; then PGPASSWORD="${DB_PASS}" pg_dump -U "${DB_USER}" -d "${DB_NAME}" -h localhost -p "${DB_PORT:-5432}" > "{{target_file}}"; else PGPASSWORD="${DB_PASS}" pg_dumpall -U "${DB_USER}" -h localhost -p "${DB_PORT:-5432}" > "{{target_file}}"; fi
  target_file: /tmp/sloth-pgsql-backup.sql
restore:
  backup_file:
    to_container: /tmp/sloth-pgsql-restore.sql
  command:
    - PGPASSWORD="${DB_PASS}" psql -U "${DB_USER}" -d "${DB_NAME}" -h localhost -p "${DB_PORT:-5432}" < "{{backup_file}}"
