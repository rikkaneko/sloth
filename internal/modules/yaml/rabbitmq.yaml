artifact_ext: json
supports_local: true
backup:
  command:
    - rabbitmqctl export_definitions - --format=json | sed '/"ts":/d' "{{target_file}}"
  target_file: /tmp/sloth-rabbitmq-definitions.json
restore:
  backup_file:
    to_container: /tmp/sloth-rabbitmq-definitions.json
  command:
    - rabbitmqctl import_definitions "{{backup_file}}"
