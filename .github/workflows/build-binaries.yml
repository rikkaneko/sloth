name: Build Standalone Binaries

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail;
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}";
          else
            VERSION="${GITHUB_SHA::7}";
          fi;
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}";
      - name: Build standalone binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail;
          mkdir -p dist;
          OUT="dist/sloth-${GOOS}-${GOARCH}";
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o "${OUT}" ./cmd/sloth;
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloth-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sloth-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/sloth-linux-amd64/sloth-linux-amd64
            release-assets/sloth-linux-arm64/sloth-linux-arm64
            release-assets/sloth-darwin-arm64/sloth-darwin-arm64
          fail_on_unmatched_files: true
          generate_release_notes: true
