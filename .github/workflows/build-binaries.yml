name: Build Standalone Binaries

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Runner diagnostics (Linux)
        if: runner.os == 'Linux'
        run: |
          uname -a;
      - name: Runner diagnostics (macOS)
        if: runner.os == 'macOS'
        run: |
          sw_vers;
      - name: Run unit tests
        run: |
          go test ./...;

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail;
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}";
          else
            VERSION="${GITHUB_SHA::7}";
          fi;
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}";
      - name: Build standalone binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail;
          mkdir -p dist;
          OUT="dist/sloth-${GOOS}-${GOARCH}";
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o "${OUT}" ./cmd/sloth;
      - name: Verify Linux static binary
        if: runner.os == 'Linux' && matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          set -euo pipefail;
          BIN="dist/sloth-linux-amd64";
          "${BIN}" --help > /dev/null;
          if ldd "${BIN}" 2>&1 | grep -q "not a dynamic executable"; then
            echo "Binary is statically linked.";
          else
            echo "Binary appears dynamically linked.";
            ldd "${BIN}";
            exit 1;
          fi;
          file "${BIN}";
      - name: Verify macOS binary metadata
        if: runner.os == 'macOS' && matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: |
          set -euo pipefail;
          BIN="dist/sloth-darwin-arm64";
          file "${BIN}";
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloth-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sloth-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/sloth-linux-amd64/sloth-linux-amd64
            release-assets/sloth-linux-arm64/sloth-linux-arm64
            release-assets/sloth-darwin-arm64/sloth-darwin-arm64
          fail_on_unmatched_files: true
          generate_release_notes: true
